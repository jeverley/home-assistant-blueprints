blueprint:
  name: Tado CE – Window Mode Sensors
  description: |
    Control Tado CE Window Mode using window and door sensors.
  domain: automation
  source_url: https://raw.githubusercontent.com/jeverley/home-assistant-blueprints/refs/heads/main/blueprints/automation/tado_ce_window_mode_sensors.yaml

  input:
    zones:
      name: Rooms
      description: |
        Configure each Tado room and its sensors.
      selector:
        object:
          label_field: climate_entity
          multiple: true
          fields:
            climate_entity:
              label: Room
              selector:
                entity:
                  domain: climate
                  integration: tado_ce

            openings:
              label: Openings
              selector:
                entity:
                  domain: binary_sensor
                  device_class:
                    - window
                    - door
                    - opening
                  multiple: true

            nearby_openings:
              label: Nearby openings
              selector:
                entity:
                  domain: binary_sensor
                  device_class:
                    - window
                    - door
                    - opening
                  multiple: true

            open_delay:
              label: Open delay (default 15s)
              selector:
                number:
                  min: 0
                  max: 120
                  unit_of_measurement: s
                  mode: box

            nearby_open_delay:
              label: Nearby open delay (default 300s)
              selector:
                number:
                  min: 0
                  max: 900
                  unit_of_measurement: s
                  mode: box

            close_delay:
              label: Close delay (default 30s)
              selector:
                number:
                  min: 0
                  max: 300
                  unit_of_measurement: s
                  mode: box

            duration:
              label: Duration (default is the Tado timeout)
              selector:
                number:
                  min: 1
                  unit_of_measurement: min
                  mode: box

            indefinite:
              label: Indefinite duration
              selector:
                boolean:

mode: parallel
max: 100

trace:
  stored_traces: 0

trigger_variables:
  zones: !input zones
  default_open_delay: 15
  default_nearby_open_delay: 300
  default_close_delay: 30

  all_openings: |
    {% set ns = namespace(o=[]) %}
    {% for z in zones %}
      {% set ns.o = ns.o + (z.openings | default([])) + (z.nearby_openings | default([])) %}
    {% endfor %}
    {{ ns.o | unique | list }}

trigger:
  - platform: event
    event_type: state_changed
  - platform: event
    event_type: tado_ce_window_action

condition:
  - condition: template
    value_template: |
      {{
        trigger.event.event_type != 'state_changed'
        or trigger.event.data.entity_id in all_openings
      }}

action:
  - choose:
      - alias: Fire manual resync event for all zones
        conditions: "{{ trigger.event is not defined }}"
        sequence:
          - repeat:
              for_each: "{{ zones }}"
              sequence:
                - variables:
                    zone: "{{ repeat.item }}"
                    state: |
                      {% set any_open = 
                        union(zone.openings|default([]), zone.nearby_openings|default([]))
                          | select('is_state', 'on')
                          | list | count > 0
                      %}
                      {{ 'on' if any_open else 'off' }}

                - event: tado_ce_window_action
                  event_data:
                    sensor: null
                    state: "{{ state }}"
                    zone: "{{ zone }}"

      - alias: Fire window actions for configured zones
        conditions: "{{ trigger.event.event_type == 'state_changed' }}"
        sequence:
          - variables:
              sensor: "{{ trigger.event.data.entity_id }}"
              state: "{{ trigger.event.data.new_state.state }}"
              matched_zones: |
                {% set ns = namespace(z=[]) %}
                {% for z in zones %}
                  {% if sensor in z.openings|default([]) or sensor in z.nearby_openings|default([]) %}
                    {% set ns.z = ns.z + [z] %}
                  {% endif %}
                {% endfor %}
                {{ ns.z }}

          - repeat:
              for_each: "{{ matched_zones }}"
              sequence:
                - event: tado_ce_window_action
                  event_data:
                    sensor: "{{ sensor }}"
                    state: "{{ state }}"
                    zone: "{{ repeat.item }}"

      - alias: Handle window action events
        conditions: "{{ trigger.event.event_type == 'tado_ce_window_action' }}"
        sequence:
          - variables:
              zone: "{{ trigger.event.data.zone }}"
              sensor: "{{ trigger.event.data.sensor }}"
              state: "{{ trigger.event.data.state }}"
              is_open: "{{ state == 'on' }}"
              is_closed: "{{ state != 'on' }}"
              is_zone: "{{ sensor in zone.openings|default([]) }}"
              is_nearby: "{{ sensor in zone.nearby_openings|default([]) }}"
              action_wait: |
                {% if not sensor %}
                  {% set s = none %}
                {% elif is_closed %}
                  {% set s = zone.close_delay|default(default_close_delay) %}
                {% elif is_zone %}
                  {% set s = zone.open_delay|default(default_open_delay) %}
                {% elif is_nearby %}
                  {% set s = zone.nearby_open_delay|default(default_nearby_open_delay) %}
                {% else %}
                  {% set s = 0 %}
                {% endif %}
                {{ none if s is none else timedelta(seconds=max(s|float, 0)) }}
              duration: "{{ zone.duration|default(none) }}"
              indefinite: "{{ zone.indefinite|default(false)|bool }}"

          - if: "{{ action_wait is not none }}"
            then:
              - wait_template: |
                  {% if is_open %}
                    {{ not is_state(sensor, 'on') }}
                  {% else %}
                    {{
                      union(zone.openings|default([]), zone.nearby_openings|default([]))
                        | select('is_state', 'on')
                        | list | count > 0
                    }}
                  {% endif %}
                timeout: "{{ action_wait }}"

          - choose:
              - conditions: "{{ is_open and (action_wait is none or not wait.completed) }}"
                sequence:
                  - action: tado_ce.set_open_window_mode
                    target:
                      entity_id: "{{ zone.climate_entity }}"
                    data: |
                      {% if indefinite or duration == 0 %}
                        {{ {'duration': 0} }}
                      {% elif duration and duration > 0 %}
                        {{ {'duration': duration * 60} }}
                      {% else %}
                        {{ {} }}
                      {% endif %}

              - conditions: "{{ is_closed and (action_wait is none or not wait.completed) }}"
                sequence:
                  - action: tado_ce.restore_previous_state
                    target:
                      entity_id: "{{ zone.climate_entity }}"

          - action: system_log.write
            data:
              level: info
              message: |
                {{ this.entity_id ~ ' event:' }}
                {{ {
                  'zone': zone,
                  'sensor': sensor,
                  'state': state,
                  'action_wait': action_wait,
                  'duration': duration,
                  'indefinite': indefinite,
                  'is_open': is_open,
                  'is_closed': is_closed,
                  'is_zone': is_zone,
                  'is_nearby': is_nearby,
                  'is_aborted': false if action_wait is none else wait.completed,
                }|to_json }}
