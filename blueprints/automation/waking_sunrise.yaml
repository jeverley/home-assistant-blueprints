blueprint:
  domain: automation
  name: Waking Sunrise
  description: |
    Biologically accurate sunrise simulation.
  source_url: https://raw.githubusercontent.com/jeverley/home-assistant-blueprints/main/blueprints/automation/waking_sunrise.yaml
  input:
    alarm_sensor:
      name: Alarm sensor (optional)
      description: |
        A sensor that reports the next waking alarm time.

        When the sensor state is `unknown` it is treated as unset.
      default: null
      selector:
        entity:
          domain: sensor
          device_class: timestamp

    fallback_time:
      name: Fallback time (optional)
      description: |
        This time is used when an alarm sensor is unspecified or `unavailable`.
      default: null
      selector:
        time:

    duration_minutes:
      name: Sunrise duration
      default: 45
      selector:
        number:
          min: 10
          max: 120
          step: 5
          unit_of_measurement: min

    helper_entity:
      name: "Helper (input_text)"
      description: |
        Tracks sunrise state, ensure the Text helper supports the maximum of `255` characters.
      selector:
        entity:
          domain: input_text

    target_lights:
      name: Lights
      description: |
        Specify lights to use in the sunrise simulation.
      selector:
        target:
          entity:
            domain: light

    start_conditions:
      name: Start conditions
      description: |
        Prevent sunrise from starting until specific conditions are satisfied.
      default: []
      selector:
        condition: {}

    nautical_phase_section:
      name: Nautical Dawn
      icon: mdi:weather-sunset
      collapsed: true
      input:
        nautical_weight_pct:
          name: Wake duration proportion (%)
          default: 30
          selector:
            number:
              min: 10
              max: 50
              step: 5
              unit_of_measurement: "%"

        nautical_brightness_end:
          name: Nautical phase end brightness (%)
          default: 15
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"

        nautical_kelvin_end:
          name: Nautical phase end kelvin
          default: 2300
          selector:
            number:
              min: 1500
              max: 3500
              step: 50
              unit_of_measurement: K

    civil_phase_section:
      name: Civil Dawn
      icon: mdi:weather-sunset-up
      collapsed: true
      input:
        civil_weight_pct:
          name: Wake duration proportion (%)
          default: 50
          selector:
            number:
              min: 30
              max: 70
              step: 5
              unit_of_measurement: "%"

        civil_brightness_end:
          name: Civil phase end brightness (%)
          default: 70
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"

        civil_kelvin_end:
          name: Civil phase end kelvin
          default: 3500
          selector:
            number:
              min: 2000
              max: 4500
              step: 50
              unit_of_measurement: K

    sunrise_phase_section:
      name: Sunrise
      icon: mdi:weather-sunny
      collapsed: true
      input:
        sunrise_weight_pct:
          name: Wake duration proportion (%)
          default: 20
          selector:
            number:
              min: 10
              max: 40
              step: 5
              unit_of_measurement: "%"

        sunrise_brightness_end:
          name: Sunrise phase end brightness (%)
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"

        sunrise_kelvin_end:
          name: Sunrise phase end kelvin
          default: 5000
          selector:
            number:
              min: 3000
              max: 6500
              step: 50
              unit_of_measurement: K

    advanced_section:
      name: Advanced
      icon: mdi:cog
      collapsed: true
      input:
        max_brightness_step:
          name: Maximum brightness step per transition (uses the intenal 1–255 range)
          default: 3
          selector:
            number:
              min: 1
              max: 10
              step: 1

mode: restart

trigger_variables:
  alarm_sensor: !input alarm_sensor
  fallback_time: !input fallback_time
  duration_minutes: !input duration_minutes
  helper_entity: !input helper_entity
  target_lights: !input target_lights
  max_brightness_step: !input max_brightness_step

  nautical_weight_pct: !input nautical_weight_pct
  civil_weight_pct: !input civil_weight_pct
  sunrise_weight_pct: !input sunrise_weight_pct

  nautical_brightness_end: !input nautical_brightness_end
  civil_brightness_end: !input civil_brightness_end
  sunrise_brightness_end: !input sunrise_brightness_end

  nautical_kelvin_end: !input nautical_kelvin_end
  civil_kelvin_end: !input civil_kelvin_end
  sunrise_kelvin_end: !input sunrise_kelvin_end

  duration: "{{ timedelta(minutes=duration_minutes | float) }}"
  duration_s: "{{ duration_minutes * 60 }}"

trigger:
  - platform: template
    value_template: |
      {% set h = states(helper_entity) | from_json(default={}) %}
      {% set last_alarm = as_datetime(h.last_alarm | default(none), none) %}
      {% set active = h.active | default(false) %}

      {% set started_today = last_alarm and last_alarm.date() == now().date() %}

      {% set sensor_state = states[alarm_sensor].state|default('unavailable') %}
      {% if sensor_state == 'unavailable' %}
        {% set sensor_dt = 'unavailable' %}
      {% else %}
        {# none/unknown is handed as no alarm set #}
        {% set sensor_dt = as_datetime(sensor_state, none) %}
      {% endif %}

      {% set fallback_dt = today_at(fallback_time) if fallback_time is not none else none %}

      {% if started_today %}
        {% set alarm_dt = last_alarm %}
      {% elif sensor_dt == 'unavailable' %}
        {% set alarm_dt = fallback_dt %}
      {% elif sensor_dt %}
        {% set alarm_dt = sensor_dt %}
      {% else %}
        {% set alarm_dt = none %}
      {% endif %}

      {% if alarm_dt %}
        {% set start_dt = alarm_dt - as_timedelta(duration) %}
        {% set end_dt = alarm_dt %}
      {% else %}
        {% set start_dt = none %}
        {% set end_dt = none %}
      {% endif %}

      {{
        alarm_dt and start_dt <= now() < end_dt
        and state_attr(this.entity_id, 'current')|int(0) == 0
        and (not started_today or active)
      }}

action:
  # --- RUNTIME VARIABLES ---
  - variables:
      h: "{{ states(helper_entity) | from_json(default={}) }}"
      last_alarm: "{{ as_datetime(h.last_alarm | default(none), none) }}"
      active: "{{ h.active | default(false) }}"
      aborted: "{{ h.aborted | default(false) }}"

      started_today: "{{ last_alarm and as_datetime(last_alarm).date() == now().date() }}"

      sensor_dt: |
        {% set s = states[alarm_sensor].state|default('unavailable') %}
        {% if s == 'unavailable' %}
          {{ 'unavailable' }}
        {% else %}
          {# none/unknown is handed as no alarm set #}
          {{ as_datetime(s, none) }}
        {% endif %}

      fallback_dt: |
        {{ today_at(fallback_time) if fallback_time is not none else none }}

      alarm_dt: |
        {% if trigger.id is not defined %}
          {# manual trigger executes a test sunrise #}
          {{ now() + as_timedelta(duration) }}
        {% elif started_today %}
          {{ last_alarm }}
        {% elif sensor_dt == 'unavailable' %}
          {{ fallback_dt }}
        {% elif sensor_dt %}
          {{ sensor_dt }}
        {% else %}
          {{ none }}
        {% endif %}

      start_dt: "{{ as_datetime(alarm_dt) - timedelta(minutes=duration_minutes) if alarm_dt else none }}"
      end_dt: "{{ as_datetime(alarm_dt) if alarm_dt else none }}"

  # --- START CONDITIONS ---
  - if: !input start_conditions
    then: []
    else:
      - repeat:
          until:
            - or:
                - and: !input start_conditions
                - condition: template
                  value_template: "{{ now() >= as_datetime(end_dt) }}"
                - condition: template
                  value_template: "{{ trigger.id is not defined }}"
          sequence:
            - delay:
                seconds: 10
      - if: !input start_conditions
        then: []
        else:
          - stop: "Start conditions not met"

  # --- WRITE HELPER (start) ---
  - service: input_text.set_value
    target:
      entity_id: "{{ helper_entity }}"
    data:
      value: |
        {{ {"last_alarm": alarm_dt, "active": trigger.id is defined, "aborted": false} | to_json }}

  # --- SUNRISE PARAMETERS ---
  - variables:
      # Phase weights
      w1: "{{ nautical_weight_pct * 0.01 }}"
      w2: "{{ civil_weight_pct * 0.01 }}"
      w3: "{{ sunrise_weight_pct * 0.01 }}"

      # Phase boundaries
      p1_end: "{{ w1 }}"
      p2_end: "{{ w1 + w2 }}"

      # Brightness boundaries in %
      b0: "{{ 1 / 255 * 100 }}"
      b1: "{{ nautical_brightness_end }}"
      b2: "{{ civil_brightness_end }}"
      b3: "{{ sunrise_brightness_end }}"

      # Kelvin boundaries
      k0: 1800
      k1: "{{ nautical_kelvin_end }}"
      k2: "{{ civil_kelvin_end }}"
      k3: "{{ sunrise_kelvin_end }}"

      # Phase exponents
      e1: 1.6
      e2: 2.2
      e3: 1.3

      # Max brightness step in %
      max_step_pct: "{{ max(max_brightness_step, 1) / 255 * 100 }}"

  # --- MAIN LOOP ---
  - repeat:
      while:
        - condition: template
          value_template: "{{ now() < as_datetime(end_dt) }}"
      sequence:
        # --- LOOP VARIABLES ---
        - variables:
            # Normalised progress 0–1
            p: |
              {{ min(max((now().timestamp() - as_datetime(start_dt).timestamp()) / duration_s, 0), 1) }}

            # Phase context dict (self-selecting based on p)
            phase: |
              {% set p = p|float %}
              {% if p <= p1_end %}
                {{ {
                  "name": "nautical",
                  "b_start": b0,
                  "b_end": b1,
                  "k_start": k0,
                  "k_end": k1,
                  "e": e1,
                  "p_start": 0,
                  "p_end": p1_end
                } }}
              {% elif p <= p2_end %}
                {{ {
                  "name": "civil",
                  "b_start": b1,
                  "b_end": b2,
                  "k_start": k1,
                  "k_end": k2,
                  "e": e2,
                  "p_start": p1_end,
                  "p_end": p2_end
                } }}
              {% else %}
                {{ {
                  "name": "sunrise",
                  "b_start": b2,
                  "b_end": b3,
                  "k_start": k2,
                  "k_end": k3,
                  "e": e3,
                  "p_start": p2_end,
                  "p_end": 1
                } }}
              {% endif %}

            # Phase duration (seconds)
            phase_duration_s: |
              {{ (phase.p_end - phase.p_start) * duration_s }}

            # Remaining time in this phase
            phase_remaining_s: |
              {{ max((phase.p_end - p|float) * duration_s, 0) }}

            # Phase-local x (0–1)
            x: |
              {{ (p|float - phase.p_start) / (phase.p_end - phase.p_start) }}

            # Current brightness
            brightness_pct: |
              {{ phase.b_start + (phase.b_end - phase.b_start) * (x|float ** phase.e) }}

            # Current kelvin (linear ramp)
            kelvin: |
              {{ (phase.k_start + (phase.k_end - phase.k_start) * x|float)|round }}

            # --- INTERVAL: time until brightness reaches (current + max_step_pct) ---
            interval: |
              {% set pbr = phase.b_end - phase.b_start %}
              {% set pd = phase_duration_s|float %}
              {% set pr = phase_remaining_s|float %}
              {% set b_now = brightness_pct|float %}
              {% set b_target = b_now + max_step_pct|float %}
              {% set x_now = x|float %}

              {% if pbr <= 0 or pd <= 0 %}
                {% set interval_curve = pr %}
              {% elif b_target >= phase.b_end %}
                {% set interval_curve = pr %}
              {% else %}
                {% set ratio = (b_target - phase.b_start) / pbr %}
                {% if ratio <= 0 %}
                  {% set interval_curve = 0 %}
                {% else %}
                  {% set x_target = ratio ** (1 / phase.e) %}
                  {% set dx = x_target - x_now %}
                  {% if dx <= 0 %}
                    {% set interval_curve = 0 %}
                  {% else %}
                    {% set interval_curve = dx * pd %}
                  {% endif %}
                {% endif %}
              {% endif %}

              {{ min(interval_curve, pr, 300) }}

            # Target progress
            target_p: |
              {{ min(p|float + (interval|float / duration_s), 1) }}

            # Target x
            target_x: |
              {{ min((target_p|float - phase.p_start) / (phase.p_end - phase.p_start), 1) }}

            # Target brightness
            target_brightness_pct: |
              {{ phase.b_start + (phase.b_end - phase.b_start) * (target_x|float ** phase.e) }}

            # Target kelvin
            target_kelvin: |
              {{ (phase.k_start + (phase.k_end - phase.k_start) * target_x|float)|round }}

        # --- USER OVERRIDE DETECTION ---
        - if: |
            {{
              not repeat.first
              and target_lights.entity_id
              | select('is_state', 'off')
              | list | count > 0
            }}
          then:
            - service: input_text.set_value
              target:
                entity_id: "{{ helper_entity }}"
              data:
                value: |
                  {{ {"last_alarm": alarm_dt, "active": false, "aborted": true} | to_json }}
            - stop: "User override detected"

        # --- APPLY TARGET STATE ---
        - service: light.turn_on
          target: !input target_lights
          data:
            brightness_pct: "{{ max(target_brightness_pct, b0) }}"
            color_temp_kelvin: "{{ target_kelvin }}"
            transition: "{{ interval }}"
        - delay:
            seconds: "{{ interval }}"

  # --- FINAL WRITEBACK ---
  - service: input_text.set_value
    target:
      entity_id: "{{ helper_entity }}"
    data:
      value: |
        {{ {"last_alarm": alarm_dt, "active": false, "aborted": false} | to_json }}
