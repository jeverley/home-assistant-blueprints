blueprint:
  domain: automation
  name: Waking Sunrise
  description: |
    Biologically accurate sunrise simulation.
  source_url: https://raw.githubusercontent.com/jeverley/home-assistant-blueprints/main/blueprints/automation/waking_sunrise.yaml
  input:
    alarm_sensor:
      name: Alarm sensor (optional)
      description: |
        A sensor that reports the next waking alarm time.

        When the sensor state is `unknown` it is treated as unset.
      default: null
      selector:
        entity:
          domain: sensor
          device_class: timestamp

    fallback_time:
      name: Fallback time (optional)
      description: |
        This time is used when an alarm sensor is unspecified or `unavailable`.
      default: null
      selector:
        time:

    helper_entity:
      name: "Helper (input_text)"
      description: |
        Tracks sunrise state, ensure the Text helper supports the maximum of `255` characters.
      selector:
        entity:
          domain: input_text

    target_lights:
      name: Lights
      description: |
        Specify lights to use in the sunrise simulation.
      selector:
        target:
          entity:
            domain: light

    start_conditions:
      name: Start conditions
      description: |
        Prevent sunrise from starting until these conditions are true
      default: []
      selector:
        condition: {}

    advanced_section:
      name: Advanced
      icon: mdi:cog
      collapsed: true
      input:
        max_brightness_step:
          name: Maximum brightness step per transition (uses the intenal 1–255 range)
          default: 3
          selector:
            number:
              min: 1
              max: 10
              step: 1

    nautical_phase_section:
      name: 1 - Nautical Dawn
      description: |
        Dim, long-wavelength light to begin melatonin suppression whilst sleep is deepest.
      icon: mdi:weather-sunset
      collapsed: true
      input:
        nautical_duration_min:
          name: Phase duration
          default: 15
          selector:
            number:
              min: 5
              max: 25
              step: 5
              unit_of_measurement: min
              mode: slider

        nautical_brightness_end:
          name: End brightness (%)
          default: 15
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"

        nautical_kelvin_end:
          name: End colour temperature (K)
          default: 2200
          selector:
            number:
              min: 1500
              max: 2500
              step: 50
              unit_of_measurement: K

        nautical_brightness_exponent:
          name: Brightness slope (exponent)
          default: 1.6
          selector:
            number:
              min: 1
              max: 2.5
              step: 0.1
              unit_of_measurement: "^"

    civil_phase_section:
      name: 2 - Civil Dawn
      description: |
        Increasing intensity and shifting spectrum to move the brain from REM/deep sleep into light sleep.
      icon: mdi:weather-sunset-up
      collapsed: true
      input:
        civil_duration_min:
          name: Phase duration
          default: 20
          selector:
            number:
              min: 10
              max: 35
              step: 5
              unit_of_measurement: min
              mode: slider

        civil_brightness_end:
          name: End brightness (%)
          default: 70
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"

        civil_kelvin_end:
          name: End colour temperature (K)
          default: 3500
          selector:
            number:
              min: 2500
              max: 4500
              step: 50
              unit_of_measurement: K

        civil_brightness_exponent:
          name: Brightness slope (exponent)
          default: 1.8
          selector:
            number:
              min: 1.2
              max: 2.2
              step: 0.1
              unit_of_measurement: "^"

    sunrise_phase_section:
      name: 3 - Sunrise
      description: |
        High-intensity, blue-enriched light to stimulate the Cortisol Awakening Response (CAR) for alertness.
      icon: mdi:weather-sunny
      collapsed: true
      input:
        sunrise_duration_min:
          name: Phase duration
          default: 15
          selector:
            number:
              min: 5
              max: 25
              step: 5
              unit_of_measurement: min
              mode: slider

        sunrise_brightness_end:
          name: End brightness (%)
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"

        sunrise_kelvin_end:
          name: End colour temperature (K)
          default: 5500
          selector:
            number:
              min: 4500
              max: 6500
              step: 50
              unit_of_measurement: K

        sunrise_brightness_exponent:
          name: Brightness slope (exponent)
          default: 1.0
          selector:
            number:
              min: 0.8
              max: 1.5
              step: 0.1
              unit_of_measurement: "^"

    maintenance_phase_section:
      name: 4 - Maintenance
      description: |
        Pre-alarm plateau at peak intensity to reduce sleep inertia.
      icon: mdi:alarm
      collapsed: true
      input:
        maintenance_duration_min:
          name: Phase duration
          default: 15
          selector:
            number:
              min: 5
              max: 20
              step: 1
              unit_of_measurement: min
              mode: slider

mode: restart

trigger_variables:
  alarm_sensor: !input alarm_sensor
  fallback_time: !input fallback_time
  helper_entity: !input helper_entity
  target_lights: !input target_lights
  max_brightness_step: !input max_brightness_step

  nautical_duration_min: !input nautical_duration_min
  civil_duration_min: !input civil_duration_min
  sunrise_duration_min: !input sunrise_duration_min
  maintenance_duration_min: !input maintenance_duration_min

  nautical_brightness_end: !input nautical_brightness_end
  civil_brightness_end: !input civil_brightness_end
  sunrise_brightness_end: !input sunrise_brightness_end

  nautical_brightness_exponent: !input nautical_brightness_exponent
  civil_brightness_exponent: !input civil_brightness_exponent
  sunrise_brightness_exponent: !input sunrise_brightness_exponent

  nautical_kelvin_end: !input nautical_kelvin_end
  civil_kelvin_end: !input civil_kelvin_end
  sunrise_kelvin_end: !input sunrise_kelvin_end

  duration_min: "{{ nautical_duration_min|int + civil_duration_min|int + sunrise_duration_min|int }}"
  duration_s: "{{ duration_min|int * 60 }}"
  duration: "{{ timedelta(minutes=duration_min|int) }}"

trigger:
  - platform: template
    value_template: |
      {% set h = states(helper_entity) | from_json(default={}) %}
      {% set last_alarm = as_datetime(h.last_alarm | default(none), none) %}
      {% set active = h.active | default(false) %}

      {% set started_today = not not last_alarm and last_alarm.date() == now().date() %}

      {% set sensor_state = states[alarm_sensor].state|default('unavailable') %}
      {% if sensor_state == 'unavailable' %}
        {% set sensor_dt = 'unavailable' %}
      {% else %}
        {# none/unknown is handed as no alarm set #}
        {% set sensor_dt = as_datetime(sensor_state, none) %}
      {% endif %}

      {% set fallback_dt = today_at(fallback_time) if fallback_time is not none else none %}

      {% if started_today %}
        {% set alarm_dt = last_alarm %}
      {% elif sensor_dt == 'unavailable' %}
        {% set alarm_dt = fallback_dt %}
      {% elif sensor_dt %}
        {% set alarm_dt = sensor_dt %}
      {% else %}
        {% set alarm_dt = none %}
      {% endif %}

      {% if alarm_dt %}
        {% set start_dt = alarm_dt - timedelta(minutes=duration_min + maintenance_duration_min) %}
        {% set end_dt = alarm_dt - timedelta(minutes=maintenance_duration_min) %}
      {% else %}
        {% set start_dt = none %}
        {% set end_dt = none %}
      {% endif %}

      {{
        alarm_dt and start_dt <= now() < alarm_dt
        and (not started_today or active)
      }}

conditions:
  - condition: template
    value_template: "{{ state_attr(this.entity_id, 'current')|int(0) == 0 }}"

action:
  # --- RUNTIME VARIABLES ---
  - variables:
      h: "{{ states(helper_entity) | from_json(default={}) }}"
      last_alarm: "{{ as_datetime(h.last_alarm | default(none), none) }}"
      active: "{{ h.active | default(false) }}"
      aborted: "{{ h.aborted | default(false) }}"

      started_today: "{{ not not last_alarm and as_datetime(last_alarm).date() == now().date() }}"

      sensor_dt: |
        {% set s = states[alarm_sensor].state|default('unavailable') %}
        {% if s == 'unavailable' %}
          {{ 'unavailable' }}
        {% else %}
          {# none/unknown is handed as no alarm set #}
          {{ as_datetime(s, none) }}
        {% endif %}

      fallback_dt: |
        {{ today_at(fallback_time) if fallback_time is not none else none }}

      alarm_dt: |
        {% if trigger.id is not defined %}
          {# manual trigger executes a test sunrise #}
          {{ now() + timedelta(minutes=duration_min + maintenance_duration_min) }}
        {% elif started_today %}
          {{ last_alarm }}
        {% elif sensor_dt == 'unavailable' %}
          {{ fallback_dt }}
        {% elif sensor_dt %}
          {{ sensor_dt }}
        {% else %}
          {{ none }}
        {% endif %}

      start_dt: "{{ as_datetime(alarm_dt) - timedelta(minutes=duration_min + maintenance_duration_min) if alarm_dt else none }}"
      end_dt: "{{ as_datetime(alarm_dt) - timedelta(minutes=maintenance_duration_min) if alarm_dt else none }}"

      # Phase weights
      w1: "{{ nautical_duration_min / duration_min }}"
      w2: "{{ civil_duration_min / duration_min }}"
      w3: "{{ sunrise_duration_min / duration_min }}"

      # Phase boundaries
      p1_end: "{{ w1 }}"
      p2_end: "{{ w1 + w2 }}"
      p3_end: 1

      # Phase durations
      p1_dur_s: "{{ nautical_duration_min * 60 }}"
      p2_dur_s: "{{ civil_duration_min * 60 }}"
      p3_dur_s: "{{ sunrise_duration_min * 60 }}"

      # Kelvin boundaries
      k0: 1800
      k1: "{{ nautical_kelvin_end }}"
      k2: "{{ civil_kelvin_end }}"
      k3: "{{ sunrise_kelvin_end }}"

      # Phase exponents
      e1: "{{ nautical_brightness_exponent }}"
      e2: "{{ civil_brightness_exponent }}"
      e3: "{{ sunrise_brightness_exponent }}"

      # Brightness boundaries (%)
      b0: "{{ 1 / 255 * 100 }}"
      b1: "{{ nautical_brightness_end }}"
      b2: "{{ civil_brightness_end }}"
      b3: "{{ sunrise_brightness_end }}"

      # Max brightness step (%)
      max_step_pct: "{{ max(max_brightness_step, 1) / 255 * 100 }}"

  # --- START CONDITIONS ---
  - if: !input start_conditions
    then: []
    else:
      - repeat:
          until:
            - or:
                - and: !input start_conditions
                - condition: template
                  value_template: "{{ now() >= as_datetime(alarm_dt) }}"
                - condition: template
                  value_template: "{{ trigger.id is not defined }}"
          sequence:
            - delay:
                seconds: 10
      - if: !input start_conditions
        then: []
        else:
          - stop: "Start conditions not met"

  # --- WRITE HELPER (start) ---
  - service: input_text.set_value
    target:
      entity_id: "{{ helper_entity }}"
    data:
      value: |
        {{ {"last_alarm": alarm_dt, "active": trigger.id is defined, "aborted": false} | to_json }}

  # --- MAIN LOOP ---
  - repeat:
      sequence:
        # --- LOOP VARIABLES ---
        - variables:
            state: |
              {% set b = target_lights.entity_id | map('state_attr', 'brightness') | reject('eq', none) | list %}
              {{ {
                "is_off": target_lights.entity_id | select('is_state', 'off') | list | count > 0,
                "b_max": b|max / 255 * 100 if b else 0
              } }}

            # Normalised progress 0–1
            p: |
              {{ min(max((now().timestamp() - as_datetime(start_dt).timestamp()) / duration_s, 0), 1) }}

            # Phase context dict (self-selecting based on p)
            phase: |
              {% set p = p|float %}
              {% if p <= p1_end %}
                {{ {
                  "name": "nautical",
                  "b_start": b0,
                  "b_end": b1,
                  "k_start": k0,
                  "k_end": k1,
                  "e": e1,
                  "p_start": 0,
                  "p_end": p1_end,
                  "p_dur_s": p1_dur_s
                } }}
              {% elif p <= p2_end %}
                {{ {
                  "name": "civil",
                  "b_start": b1,
                  "b_end": b2,
                  "k_start": k1,
                  "k_end": k2,
                  "e": e2,
                  "p_start": p1_end,
                  "p_end": p2_end,
                  "p_dur_s": p2_dur_s
                } }}
              {% else %}
                {{ {
                  "name": "sunrise",
                  "b_start": b2,
                  "b_end": b3,
                  "k_start": k2,
                  "k_end": k3,
                  "e": e3,
                  "p_start": p2_end,
                  "p_end": p3_end,
                  "p_dur_s": p3_dur_s
                } }}
              {% endif %}

            # Remaining time in this phase
            phase_remaining_s: |
              {{ max((phase.p_end - p|float) * duration_s, 0) }}

            # Phase-local x (0–1)
            x: |
              {{ (p|float - phase.p_start) / (phase.p_end - phase.p_start) }}

            # Current brightness
            brightness_pct: |
              {{ phase.b_start + (phase.b_end - phase.b_start) * (x|float ** phase.e) }}

            # Current Kelvin (linear ramp)
            kelvin: |
              {{ (phase.k_start + (phase.k_end - phase.k_start) * x|float)|round }}

            # --- INTERVAL: time until brightness reaches (current + max_step_pct) ---
            interval: |
              {% set pbr = phase.b_end - phase.b_start %}
              {% set pd = phase.p_dur_s|float %}
              {% set pr = phase_remaining_s|float %}
              {% set b_now = brightness_pct|float %}
              {% set b_target = b_now + max_step_pct|float %}
              {% set x_now = x|float %}

              {% if pbr <= 0 or pd <= 0 %}
                {% set interval_curve = pr %}
              {% elif b_target >= phase.b_end %}
                {% set interval_curve = pr %}
              {% else %}
                {% set ratio = (b_target - phase.b_start) / pbr %}
                {% if ratio <= 0 %}
                  {% set interval_curve = 0 %}
                {% else %}
                  {% set x_target = ratio ** (1 / phase.e) %}
                  {% set dx = x_target - x_now %}
                  {% if dx <= 0 %}
                    {% set interval_curve = 0 %}
                  {% else %}
                    {% set interval_curve = dx * pd %}
                  {% endif %}
                {% endif %}
              {% endif %}

              {{ min(interval_curve, pr, 300) }}

            # Target progress
            target_p: |
              {{ min(p|float + (interval|float / duration_s), 1) }}

            # Target x
            target_x: |
              {{ min((target_p|float - phase.p_start) / (phase.p_end - phase.p_start), 1) }}

            # Target brightness
            target_brightness_pct: |
              {{ phase.b_start + (phase.b_end - phase.b_start) * (target_x|float ** phase.e) }}

            # Target kelvin
            target_kelvin: |
              {{ (phase.k_start + (phase.k_end - phase.k_start) * target_x|float)|round }}

        # --- USER OVERRIDE DETECTION ---
        - if: |
            {{ not repeat.first and (state.is_off or state.b_max - 1 > target_brightness_pct) }}
          then:
            - service: input_text.set_value
              target:
                entity_id: "{{ helper_entity }}"
              data:
                value: |
                  {{ {"last_alarm": alarm_dt, "active": false, "aborted": true} | to_json }}
            - stop: "User override detected"

        # --- APPLY TARGET STATE ---
        - service: light.turn_on
          target: !input target_lights
          data:
            brightness_pct: "{{ max(target_brightness_pct, b0) }}"
            color_temp_kelvin: "{{ max(target_kelvin, k0) }}"
            transition: "{{ interval }}"
        - delay:
            seconds: "{{ interval }}"
      until:
        - condition: template
          value_template: "{{ target_p >= 1 }}"

  # --- FINAL WRITEBACK ---
  - service: input_text.set_value
    target:
      entity_id: "{{ helper_entity }}"
    data:
      value: |
        {{ {"last_alarm": alarm_dt, "active": false, "aborted": false} | to_json }}
